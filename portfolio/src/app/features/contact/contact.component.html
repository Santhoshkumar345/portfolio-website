<section id="contact" class="section">
  <div class="section__header" appScrollReveal>
    <h2 class="section__title">Contact</h2>
    <p class="section__subtitle">Let's work together</p>
  </div>

  <div class="contact-container" appScrollReveal>
    <div class="contact-card">
      @if (submitted) {
        <div class="contact-success">
          <i class="fa-solid fa-circle-check"></i>
          <h3>Message Sent!</h3>
          <p>Thank you for reaching out. I'll get back to you soon.</p>
        </div>
      } @else {
        <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input
              id="name"
              type="text"
              [(ngModel)]="formData.name"
              name="name"
              required
              placeholder="Your name"
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              [(ngModel)]="formData.email"
              name="email"
              required
              placeholder="your@email.com"
            />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input
              id="subject"
              type="text"
              [(ngModel)]="formData.subject"
              name="subject"
              placeholder="Subject"
            />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              [(ngModel)]="formData.message"
              name="message"
              required
              rows="5"
              placeholder="Your message..."
            ></textarea>
          </div>
          <button type="submit" class="btn btn--primary btn--full" [disabled]="contactForm.invalid">
            <i class="fa-solid fa-paper-plane"></i> Send Message
          </button>
        </form>
      }
    </div>
  </div>
</section>
